[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<police_led_test.cpp>
board_build.partitions = min_spiffs.csv
build_flags = 
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_LOG_LEVEL=3
lib_deps = 
    Wire
    SPIFFS
    bblanchon/ArduinoJson@^7.2.0
    electroniccats/MPU6050@^1.0.0
    adafruit/Adafruit NeoPixel@^1.11.0
upload_speed = 115200

[env:esp32-police-leds]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<police_led_test.cpp>
lib_deps = 
    adafruit/Adafruit NeoPixel@^1.11.0
upload_speed = 115200
upload_flags =
    --before
    default_reset
    --after
    hard_reset
    --baud
    115200
