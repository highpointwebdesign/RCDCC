[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_rcdcc.csv
build_flags = 
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_LOG_LEVEL=3
    -DARDUINO_LOOP_STACK_SIZE=16384
lib_deps = 
    Wire
    bblanchon/ArduinoJson@^7.2.0
    electroniccats/MPU6050@^1.0.0
    adafruit/Adafruit NeoPixel@^1.11.0
upload_speed = 115200
upload_flags =
    --before
    default_reset
    --after
    hard_reset
