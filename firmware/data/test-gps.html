<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>GPS PWA Test</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="test.webmanifest">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GPS Test">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .label {
            font-weight: 600;
        }
        
        .value {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .success {
            color: #10b981;
        }
        
        .error {
            color: #ef4444;
        }
        
        .warning {
            color: #f59e0b;
        }
        
        button {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:active {
            background: rgba(255, 255, 255, 0.7);
        }
        
        #log {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 GPS PWA Test</h1>
        
        <!-- Context Info -->
        <div class="card">
            <h3 style="margin-bottom: 15px;">App Context</h3>
            <div class="status-item">
                <span class="label">Protocol</span>
                <span class="value" id="protocol">--</span>
            </div>
            <div class="status-item">
                <span class="label">Secure Context</span>
                <span class="value" id="secureContext">--</span>
            </div>
            <div class="status-item">
                <span class="label">GPS Available</span>
                <span class="value" id="geoAvailable">--</span>
            </div>
            <div class="status-item">
                <span class="label">Display Mode</span>
                <span class="value" id="displayMode">--</span>
            </div>
        </div>
        
        <!-- GPS Data -->
        <div class="card">
            <h3 style="margin-bottom: 15px;">GPS Location</h3>
            <div class="status-item">
                <span class="label">Latitude</span>
                <span class="value" id="latitude">--</span>
            </div>
            <div class="status-item">
                <span class="label">Longitude</span>
                <span class="value" id="longitude">--</span>
            </div>
            <div class="status-item">
                <span class="label">Accuracy</span>
                <span class="value" id="accuracy">--</span>
            </div>
            <div class="status-item">
                <span class="label">Altitude</span>
                <span class="value" id="altitude">--</span>
            </div>
        </div>
        
        <!-- Controls -->
        <button id="requestBtn">Request GPS Permission</button>
        <button id="getLocationBtn">Get Current Location</button>
        
        <!-- Log -->
        <div class="card">
            <h3 style="margin-bottom: 15px;">Log</h3>
            <div id="log">Waiting for action...</div>
        </div>
    </div>
    
    <script>
        const log = document.getElementById('log');
        
        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            log.textContent += `[${timestamp}] ${message}\n`;
            log.scrollTop = log.scrollHeight;
        }
        
        // Display context info
        function updateContext() {
            const protocol = window.location.protocol;
            document.getElementById('protocol').textContent = protocol;
            document.getElementById('protocol').className = 
                protocol === 'https:' ? 'value success' :
                protocol === 'http:' ? 'value warning' :
                'value error';
            
            const isSecure = window.isSecureContext;
            document.getElementById('secureContext').textContent = isSecure ? '✓ Yes' : '✗ No';
            document.getElementById('secureContext').className = isSecure ? 'value success' : 'value error';
            
            const hasGeo = 'geolocation' in navigator;
            document.getElementById('geoAvailable').textContent = hasGeo ? '✓ Yes' : '✗ No';
            document.getElementById('geoAvailable').className = hasGeo ? 'value success' : 'value error';
            
            // Check if running as PWA
            const displayMode = window.matchMedia('(display-mode: standalone)').matches ? 'PWA' :
                               window.matchMedia('(display-mode: fullscreen)').matches ? 'Fullscreen' :
                               'Browser';
            document.getElementById('displayMode').textContent = displayMode;
            document.getElementById('displayMode').className = 
                displayMode === 'PWA' ? 'value success' : 'value';
            
            addLog(`Protocol: ${protocol}`);
            addLog(`Secure Context: ${isSecure}`);
            addLog(`Geolocation: ${hasGeo}`);
            addLog(`Display Mode: ${displayMode}`);
        }
        
        // Request permission
        document.getElementById('requestBtn').addEventListener('click', async () => {
            addLog('Requesting GPS permission...');
            
            if (!('geolocation' in navigator)) {
                addLog('ERROR: Geolocation not supported');
                return;
            }
            
            // Check permission API if available
            if ('permissions' in navigator) {
                try {
                    const result = await navigator.permissions.query({ name: 'geolocation' });
                    addLog(`Permission state: ${result.state}`);
                } catch (error) {
                    addLog(`Permission API not available: ${error.message}`);
                }
            }
            
            // Trigger permission request by getting location
            navigator.geolocation.getCurrentPosition(
                position => {
                    addLog('SUCCESS: Permission granted');
                    updateLocation(position);
                },
                error => {
                    addLog(`ERROR: ${getErrorMessage(error)}`);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });
        
        // Get location
        document.getElementById('getLocationBtn').addEventListener('click', () => {
            addLog('Getting current location...');
            
            if (!('geolocation' in navigator)) {
                addLog('ERROR: Geolocation not supported');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                position => {
                    addLog('SUCCESS: Location retrieved');
                    updateLocation(position);
                },
                error => {
                    addLog(`ERROR: ${getErrorMessage(error)}`);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });
        
        function updateLocation(position) {
            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);
            const acc = position.coords.accuracy.toFixed(1);
            const alt = position.coords.altitude ? position.coords.altitude.toFixed(1) : 'N/A';
            
            document.getElementById('latitude').textContent = lat + '°';
            document.getElementById('longitude').textContent = lon + '°';
            document.getElementById('accuracy').textContent = '±' + acc + ' m';
            document.getElementById('altitude').textContent = alt + ' m';
            
            addLog(`Lat: ${lat}, Lon: ${lon}`);
            addLog(`Accuracy: ±${acc}m`);
        }
        
        function getErrorMessage(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    return 'Permission denied by user';
                case error.POSITION_UNAVAILABLE:
                    return 'Position unavailable';
                case error.TIMEOUT:
                    return 'Request timeout';
                default:
                    return 'Unknown error';
            }
        }
        
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./test-sw.js')
                .then(reg => {
                    addLog('Service Worker registered');
                })
                .catch(err => {
                    addLog(`Service Worker failed: ${err.message}`);
                });
        }
        
        // Initialize on load
        updateContext();
    </script>
</body>
</html>
