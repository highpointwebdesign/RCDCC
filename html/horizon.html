<!DOCTYPE html><html><head>  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
body {
  font-family: verdana;
  margin: 10px;
  text-align: center;
}
.gauge-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.circle-container {
  position: relative;
  width: 200px;
  height: 200px;
  margin: auto;
}
.circle {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 2px solid black;
  border-radius: 50%;
  overflow: hidden;
  transition: transform 0.5s;
}
.circle .ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background-color: #999999;
}
.circle .sky {
  position: absolute;
  top: 0;
  width: 100%;
  height: 50%;
  background-color: aqua;
}
.groundneedle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 2px;
  height: 100%;
  background-color: black;
  transform: translateX(-50%);
  z-index: 1;
}
.skyneedle {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background-color: #999;
  transform: translateX(-50%);
  z-index: 1;
}
.lines {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 106%;
  height: 106%;
  pointer-events: none;
  transform: rotate(90deg);
  z-index: -5;
}
.line {
  position: absolute;
  width: 1px;
  height: 104px; /* 100px radius + 4px beyond */
  background-color: black;
  top: 50%;
  left: 0;
  transform-origin: center bottom;
  transform: translateY(-50%);
}
.degree-display {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 14px;
  background-color: white;
  padding: 2px 5px;
  border-radius: 3px;
  box-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
  z-index: 2;
}
.truck-icon-side {
  position: absolute;
  top: 50%;
  left: 50%;
  
  height: 100px;
  transform: translate(-50%, -50%);
  z-index: 1;
}
.truck-icon-front {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100px;
  
  transform: translate(-50%, -50%);
  z-index: 1;
}  </style></head><body>  <h1>Artificial Horizon Gauges</h1>  <div class="gauge-container">
<div class="circle-container">
  <div class="circle" id="roll-circle">

<div class="sky"></div>

<div class="ground"></div>

<div class="groundneedle"></div>

<div class="skyneedle"></div>

<img src="img/truck-side.png" class="truck-icon-side" alt="Truck Front">
  </div>
  <div class="lines" id="roll-lines"></div>
  <div class="degree-display" id="roll-degree">0°</div>
</div>
<div class="circle-container">
  <div class="circle" id="pitch-circle">

<div class="sky"></div>

<div class="ground"></div>

<div class="groundneedle"></div>

<div class="skyneedle"></div>

<img src="img/truck-front.png" class="truck-icon-front" alt="Truck Side">
  </div>
  <div class="lines" id="pitch-lines"></div>
  <div class="degree-display" id="pitch-degree">0°</div>
</div>  </div>
  <script>
let roll = 0; // Initial roll angle (left and right)
let pitch = 0; // Initial pitch angle (up and down)

function createLines(containerId) {
  const lineContainer = document.getElementById(containerId);
  for (let i = 5; i <= 90; i += 5) {

createLine(lineContainer, i);

createLine(lineContainer, -i);
  }
}

function createLine(container, angle) {
  const line = document.createElement('div');
  line.className = 'line';
  line.style.transform = `translateX(-25%) rotate(${angle}deg)`;
  container.appendChild(line);
}

function updateRoll() {
  const circle = document.getElementById('roll-circle');
  circle.style.transform = `rotate(${roll}deg)`;
  document.getElementById('roll-degree').innerText = `${Math.abs(roll).toFixed(1)}°`;
}

function updatePitch() {
  const circle = document.getElementById('pitch-circle');
  circle.style.transform = `rotate(${pitch}deg)`;
  document.getElementById('pitch-degree').innerText = `${Math.abs(pitch).toFixed(1)}°`;
}

function simulateRoll() {
  // Simulate changes in roll
  roll = (Math.random() * 90 - 45); // Mock data: roll between -45 and 45 degrees

  updateRoll();
}

function simulatePitch() {
  // Simulate changes in pitch
  pitch = (Math.random() * 90 - 45); // Mock data: pitch between -45 and 45 degrees

  updatePitch();
}

window.onload = function() {
  createLines('roll-lines');
  createLines('pitch-lines');
  updateRoll();
  updatePitch();
  setInterval(simulateRoll, 500); // Update roll every 0.5 second
  setInterval(simulatePitch, 500); // Update pitch every 0.5 second
};  </script></body></html>
